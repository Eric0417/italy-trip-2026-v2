services:
  - type: web
    name: italy-trip-2026
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: italy-trip-db
          property: connectionString

databases:
  - name: italy-trip-db
    plan: free
